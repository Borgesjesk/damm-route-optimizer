<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DammRoute — Smart Logistics · InterhackBCN 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
      }

      /* Dark Leaflet popups */
      .leaflet-popup-content-wrapper {
        background: #141414 !important;
        color: #ccc !important;
        border: 1px solid #2a2a2a !important;
        border-radius: 8px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.85) !important;
      }
      .leaflet-popup-tip { background: #141414 !important; }
      .leaflet-popup-close-button { color: #555 !important; top: 6px !important; right: 8px !important; }
      .leaflet-popup-content {
        margin: 10px 14px !important;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        line-height: 1.65;
        color: #999;
      }
      .leaflet-popup-content strong {
        color: #fff;
        display: block;
        margin-bottom: 5px;
        font-size: 12px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
      }
      .leaflet-control-zoom a {
        background: #1a1a1a !important;
        color: #888 !important;
        border-color: #2a2a2a !important;
      }
      .leaflet-control-zoom a:hover {
        background: #222 !important;
        color: #fff !important;
      }
      .leaflet-bar { border: 1px solid #2a2a2a !important; box-shadow: none !important; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    </style>
  </head>
  <body>
    <noscript>DammRoute requires JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
