# ── SERVER ──────────────────────────────────────────────────────
server.port=8080

# ── H2 DATABASE ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:dammroute;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── SECURITY ─────────────────────────────────────────────────────
# API key for demo — in production use JWT or OAuth2
app.security.api-key=dammroute-hackathon-2026

# ── LOGGING ──────────────────────────────────────────────────────
logging.level.com.dammroute=INFO
logging.level.org.springframework.security=WARN

# ── DAMM WAREHOUSE COORDINATES ───────────────────────────────────
app.warehouse.latitude=41.3167
app.warehouse.longitude=2.0833
app.warehouse.name=Damm Warehouse El Prat

# ── CO2 CONSTANTS ────────────────────────────────────────────────
# kg CO2 per km — Euro VI diesel truck (EEA standard)
app.co2.kg-per-km=0.27
